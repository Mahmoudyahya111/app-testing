    <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyRF3tkP6T86uIkem6QA0zWfiT4bVWTLLHMGGQpmguGFGOQVEnOUFpNXWJKGy67KKEXlQ/exec'
    const form = document.getElementById('clothing-form')
    const submitButton = document.getElementById('submit-btn')

    form.addEventListener('submit', e => {
        e.preventDefault() 
        
        submitButton.disabled = true
        submitButton.innerHTML = "Sending..."

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                // 1. Show the Thank You Pop-up
                alert("Thank you for your submission! Your clothing preferences have been recorded.");

                // 2. Wait 1 second, then redirect
                setTimeout(() => {
                    // CHANGE THE LINE BELOW TO YOUR NEW FILE NAME
                    window.location.href = "shop.html"; 
                }, 1000); 
            })
            .catch(error => {
                console.error('Error!', error.message)
                submitButton.disabled = false
                submitButton.innerHTML = "Submit feedback"
                alert("Something went wrong. Please try again.")
            })
    })

     // Ensure the script runs after the HTML is fully loaded
    window.addEventListener('load', () => {
        const menuBtn = document.getElementById('menu-btn');
        const navMenu = document.getElementById('nav-menu');

        if (menuBtn && navMenu) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Stops the click from bubbling to the document
                navMenu.classList.toggle('show');
                console.log("Menu toggled"); // Check your console (F12) to see this
            });

            // Close the box if the user clicks anywhere else[cite: 5]
            document.addEventListener('click', (e) => {
                if (!navMenu.contains(e.target) && !menuBtn.contains(e.target)) {
                    navMenu.classList.remove('show');
                }
            });
        } else {
            console.error("Menu elements not found. Check your IDs!");
        }
    });
</script>
